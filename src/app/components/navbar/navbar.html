<nav class="navbar-glass sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">

    <!-- Logo -->
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center"
           style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="3" fill="white"/>
          <circle cx="8" cy="8" r="6" stroke="white" stroke-width="1.2" fill="none" stroke-dasharray="3 2"/>
        </svg>
      </div>
      <div class="flex items-baseline gap-2">
        <span style="font-family: var(--font-display); font-weight: 700; font-size: 18px; letter-spacing: -0.02em; color: var(--text-primary);">
          DevPulse
        </span>
        <span class="hidden sm:block" style="font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); letter-spacing: 0.04em;">
          v2.0
        </span>
      </div>
    </div>

    <!-- Right actions -->
    <div class="flex items-center gap-2">
      <button class="nav-btn hidden sm:flex items-center gap-1.5" (click)="viewTrends()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="1,9 4,5 7,7 12,2"/>
          <polyline points="9,2 12,2 12,5"/>
        </svg>
        Trends
      </button>

      <button class="nav-btn hidden sm:flex items-center gap-1.5" (click)="viewBookmark()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 2h9v10l-4.5-2.5L2 12V2z"/>
        </svg>
        Bookmarks
      </button>

      <button class="nav-btn flex items-center gap-1.5" (click)="toggleDark()" [attr.aria-label]="isDark ? 'Light mode' : 'Dark mode'">
        <span style="font-size: 14px;">{{ isDark ? '☀️' : '🌙' }}</span>
        <span class="hidden sm:inline">{{ isDark ? 'Light' : 'Dark' }}</span>
      </button>
    </div>

  </div>
</nav>
