<div class="flex flex-wrap gap-4 mt-6">

  <button
    *ngFor="let tech of techStacks"
    class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
    (click)="selectTech(tech)"
  >
    {{ tech | titlecase }}
  </button>

</div>

<div
  *ngIf="loading && github.length === 0 && reddit.length === 0 && news.length === 0"
  class="mt-10 text-center"
>
  <div class="inline-block animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>

  <p class="mt-2">Loading latest updates...</p>
</div>

<div *ngIf="!loading" class="mt-10 grid gap-6 lg:grid-cols-3">
  <div *ngIf="github.length > 0" class="mt-10">
    <h2 class="text-2xl font-bold mb-4">🔥 GitHub Releases</h2>

    <div class="space-y-4">
      <div
        *ngFor="let item of github"
        class="p-4 bg-white dark:bg-gray-800 shadow rounded-lg hover:shadow-xl transition transform hover:-translate-y-1"
      >
        <div class="flex justify-between items-start">
          <a
            [href]="item.url"
            target="_blank"
            class="text-blue-600 dark:text-blue-400 font-semibold"
          >
            {{ item.name }}
          </a>

          <button class="text-yellow-500 hover:scale-110 transition" (click)="saveBookmark(item)">
            ⭐
          </button>
        </div>
        <p class="text-gray-500 dark:text-gray-400 text-sm">
          {{ item.date }}
        </p>
      </div>
    </div>
  </div>

  <div *ngIf="reddit.length > 0" class="mt-10">
    <h2 class="text-2xl font-bold mb-4">💬 Reddit Discussions</h2>

    <div class="space-y-4">
      <div
        *ngFor="let post of reddit"
        class="p-4 bg-white dark:bg-gray-800 shadow rounded-lg hover:shadow-xl transition transform hover:-translate-y-1"
      >
        <a [href]="post.url" target="_blank" class="font-semibold text-blue-600 dark:text-blue-400">
          {{ post.title }}
        </a>

        <p class="text-sm text-gray-500 dark:text-gray-400">
          r/{{ post.subreddit }} • ⭐ {{ post.score }}
        </p>
      </div>
    </div>
  </div>

  <div *ngIf="news.length > 0" class="mt-10">
    <h2 class="text-2xl font-bold mb-4">📰 Tech News</h2>

    <div class="space-y-4">
      <div
        *ngFor="let article of news"
        class="p-4 bg-white dark:bg-gray-800 shadow rounded-lg hover:shadow-xl transition transform hover:-translate-y-1"
      >
        <a
          [href]="article.url"
          target="_blank"
          class="font-semibold text-blue-600 dark:text-blue-400"
        >
          {{ article.title }}
        </a>

        <p class="text-sm text-gray-500 dark:text-gray-400">
          {{ article.source }}
        </p>
      </div>
    </div>
  </div>
</div>

<!-- ⭐ BOOKMARKS SECTION -->

<div class="mt-16" id="bookmark">

  <h2 class="text-xl font-bold mb-4">⭐ Bookmarks</h2>

  <div *ngIf="bookmarks.length === 0" class="text-gray-500">
    No bookmarks yet.
  </div>

  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">

    <div
      *ngFor="let item of bookmarks"
      class="p-4 bg-white dark:bg-gray-800 shadow rounded-lg"
    >

      <a
        [href]="item.url"
        target="_blank"
        class="text-blue-600 dark:text-blue-400 font-semibold"
      >
        {{ item.name || item.title }}
      </a>

    </div>

  </div>

</div>
<app-trending-chart></app-trending-chart>
