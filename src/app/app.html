<div style="position:relative; z-index:1;">
  <app-navbar></app-navbar>

  <div style="max-width:1280px; margin:0 auto; padding:40px 24px 80px;">

    <!-- Hero -->
    <div style="margin-bottom:44px;" class="animate-in">
      <!-- Eyebrow label -->
      <div style="display:inline-flex; align-items:center; gap:8px; margin-bottom:16px;
                  padding:5px 14px; border-radius:99px;
                  background:var(--accent-soft); border:1px solid rgba(99,102,241,0.2);">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--accent);
                     animation:pulseDot 2s ease-in-out infinite; display:inline-block;"></span>
        <span style="font-family:var(--font-mono); font-size:12px; color:var(--accent); font-weight:500; letter-spacing:0.05em;">
          Live · 8 developer sources
        </span>
      </div>

      <h1 style="font-family:var(--font-display); font-size:clamp(32px,4.5vw,52px);
                 font-weight:700; letter-spacing:-0.03em; line-height:1.12;
                 color:var(--text-primary); margin-bottom:16px;">
        Your personal tech
        <span style="display:inline-block; position:relative;">
          <span style="background:linear-gradient(135deg,#6366f1,#8b5cf6,#06b6d4);
                       -webkit-background-clip:text; -webkit-text-fill-color:transparent;
                       background-clip:text;">newsroom</span>
        </span>
      </h1>

      <p style="font-size:17px; color:var(--text-secondary); max-width:520px;
                line-height:1.65; font-weight:400;">
        Search any technology and get live updates from GitHub, Reddit,
        StackOverflow, Hacker News, Dev.to, NPM and more — all in one dashboard.
      </p>
    </div>

    <app-tech-selector></app-tech-selector>

  </div>
</div>

<style>
  @keyframes pulseDot {
    0%,100% { opacity:1; transform:scale(1); }
    50%     { opacity:0.5; transform:scale(1.5); }
  }
</style>
